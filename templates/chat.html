<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    
  


    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; height: 100vh; overflow: hidden; }

        #userListView { height: 100vh; display: flex; flex-direction: column; }
        #chatView     { height: 100vh; display: none; flex-direction: column; }

        .topbar {
            background: #075e54;
            color: white;
            padding: 14px 16px;
            font-size: 17px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #searchInput {
            padding: 10px 14px;
            border: none;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            outline: none;
            width: 100%;
        }

        #userList { flex: 1; overflow-y: auto; background: white; }

        .user-row {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            font-size: 15px;
        }
        .user-row:hover { background: #f5f5f5; }

        #chatBox {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bubble-wrap {
            display: flex;
            flex-direction: column;
        }
        .bubble-wrap.sent  { align-items: flex-end; }
        .bubble-wrap.received { align-items: flex-start; }

        .bubble {
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 70%;
            font-size: 14px;
            word-wrap: break-word;
            position: relative;
        }

        .sent .bubble {
            background: #dcf8c6;
            border-bottom-right-radius: 2px;
        }

        .received .bubble {
            background: white;
            border-bottom-left-radius: 2px;
        }

        .bubble img {
            max-width: 220px;
            max-height: 220px;
            border-radius: 8px;
            display: block;
            cursor: pointer;
        }

        /* Delete button — hover pe dikhega */
        .delete-btn {
            display: none;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            cursor: pointer;
            position: absolute;
            top: -8px;
            right: -8px;
            line-height: 22px;
            text-align: center;
        }

        .bubble-wrap.sent .bubble:hover .delete-btn {
            display: block;
        }

        #inputRow {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
            gap: 8px;
            align-items: center;
        }

        /* Photo button */
        #photoBtn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 0 4px;
        }

        #msgInput {
            flex: 1;
            padding: 10px 14px;
            border-radius: 22px;
            border: 1px solid #ccc;
            font-size: 15px;
            outline: none;
        }
        #sendBtn {
            padding: 10px 20px;
            background: #075e54;
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 15px;
            cursor: pointer;
        }
        #backBtn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }
        #photoInput { display: none; }

        /* Image preview before send */
        #previewBox {
            display: none;
            padding: 8px 12px;
            background: #f0f0f0;
            align-items: center;
            gap: 10px;
        }
        #previewBox img {
            height: 60px;
            border-radius: 6px;
        }
        #cancelPreview {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 14px;
        }
#userList .user-row {
    display: none;
}

    </style>
</head>
<body>

<!-- USER LIST -->
   <div id="userListView">
    <div class="topbar">
        <span style="flex:1;">💬 {{ username }}</span>
        <a href="/logout" style="
            color: white;
            text-decoration: none;
            font-size: 13px;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 16px;
        ">Logout</a>
    </div>
    <input id="searchInput" placeholder="Search user..." oninput="searchUsers(this.value)">
    <div id="userList">
        {% for user in users %}
        <div class="user-row" onclick="openChat({{ user.id }}, '{{ user.username }}')">
            {{ user.username }}
        </div>
        {% endfor %}
    </div>
</div>

<!-- CHAT -->
<div id="chatView">
    <div class="topbar">
        <button id="backBtn" onclick="goBack()">&#8592;</button>
        <span id="chatWithName"></span>
            <button onclick="clearChat()" style="background:none; border:none; color:white; font-size:13px; cursor:pointer;">🗑 Clear</button>

    </div>

    <div id="chatBox"></div>
    <div id="typingIndicator" style="
    display:none;
    padding: 6px 16px;
    font-size: 13px;
    color: #666;
    background: #e5ddd5;
    font-style: italic;
">
    typing...
</div>

    <!-- Image preview -->
    <div id="previewBox">
        <img id="previewImg" src="">
        <button id="cancelPreview" onclick="cancelPhoto()">✕</button>
        <button id="sendPhotoBtn" onclick="sendPhoto()" style="padding:6px 14px; background:#075e54; color:white; border:none; border-radius:16px; cursor:pointer;">Send</button>
    </div>

    <div id="inputRow">
        <button id="photoBtn" onclick="document.getElementById('photoInput').click()">📷</button>
        <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(this)">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
        <button id="sendBtn" onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
    var myId = {{ session_user_id }};
    var selectedUser = null;
    var selectedFile = null;
   var socket = io({
    transports: ['polling'],
    upgrade: false
});

    function openChat(id, name) {
        selectedUser = id;
        document.getElementById("chatWithName").innerText = name;
        document.getElementById("userListView").style.display = "none";
        document.getElementById("chatView").style.display = "flex";
        loadHistory(id);
        document.getElementById("msgInput").focus();
    }

    function goBack() {
        selectedUser = null;
        document.getElementById("chatView").style.display = "none";
        document.getElementById("userListView").style.display = "flex";
    }

    function loadHistory(id) {
        document.getElementById("chatBox").innerHTML = "";
        fetch("/messages/" + id)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                data.messages.forEach(function(m) {
                    addBubble(m.id, m.text, m.image, m.from === myId);
                });
            });
    }

    function addBubble(msgId, text, image, isMe) {
        var box = document.getElementById("chatBox");

        var wrap = document.createElement("div");
        wrap.className = "bubble-wrap " + (isMe ? "sent" : "received");
        wrap.dataset.id = msgId;

        var bubble = document.createElement("div");
        bubble.className = "bubble";

        if (image) {
            var img = document.createElement("img");
            img.src = image;
            img.onclick = function() { window.open(image); };
            bubble.appendChild(img);
        }

        if (text) {
            bubble.appendChild(document.createTextNode(text));
        }

        // Delete button — sirf apne sent messages par
        if (isMe) {
            var delBtn = document.createElement("button");
            delBtn.className = "delete-btn";
            delBtn.innerHTML = "✕";
            delBtn.onclick = function(e) {
                e.stopPropagation();
                deleteMessage(msgId, wrap);
            };
            bubble.appendChild(delBtn);
        }

        wrap.appendChild(bubble);
        box.appendChild(wrap);
        box.scrollTop = box.scrollHeight;
    }

// ---- TYPING INDICATOR ----
var typingTimer = null;

document.getElementById("msgInput").addEventListener("input", function() {
        console.log("Typing event — selectedUser:", selectedUser);
    // Server ko batao "main type kar raha hoon"
    socket.emit("typing", { to: selectedUser });

    // 2 second baad "stop typing" emit karo
    clearTimeout(typingTimer);
    typingTimer = setTimeout(function() {
        socket.emit("stop_typing", { to: selectedUser });
    }, 2000);
});

socket.on("typing", function(data) {
    if (parseInt(data.from) === selectedUser) {
        document.getElementById("typingIndicator").style.display = "block";
    }
});

socket.on("stop_typing", function(data) {
    if (parseInt(data.from) === selectedUser) {
        document.getElementById("typingIndicator").style.display = "none";
    }
});



    // ---- SEND TEXT ----
    function sendMsg() {
        var msg = document.getElementById("msgInput").value.trim();
        if (!selectedUser || msg === "") return;

        socket.emit("private_message", { to: selectedUser, message: msg });
        addBubble(null, msg, null, true);
        document.getElementById("msgInput").value = "";
    }

    document.getElementById("msgInput").onkeydown = function(e) {
        if (e.key === "Enter") sendMsg();
    };

    // ---- PHOTO PREVIEW ----
    function previewPhoto(input) {
        if (!input.files || !input.files[0]) return;
        selectedFile = input.files[0];
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("previewImg").src = e.target.result;
            document.getElementById("previewBox").style.display = "flex";
        };
        reader.readAsDataURL(selectedFile);
    }

    function cancelPhoto() {
        selectedFile = null;
        document.getElementById("photoInput").value = "";
        document.getElementById("previewBox").style.display = "none";
    }

    // ---- SEND PHOTO ----
    function sendPhoto() {
        if (!selectedFile || !selectedUser) return;

        var formData = new FormData();
        formData.append("photo", selectedFile);
        formData.append("receiver_id", selectedUser);

        fetch("/upload", {
            method: "POST",
            body: formData
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.image) {
                addBubble(data.msg_id, null, data.image, true);
                cancelPhoto();
            }
        });
    }

    // ---- DELETE MESSAGE ----
    function deleteMessage(msgId, wrapEl) {
        if (!msgId) {
            wrapEl.remove();
            return;
        }
        if (!confirm("Delete this message for everyone?")) return;

        fetch("/delete/message/" + msgId, { method: "DELETE" })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                wrapEl.remove();
            }
        });
    }

    // ---- RECEIVE MESSAGE ----
    socket.on("private_message", function(data) {
        console.log("📩 Received:", data);
        if (selectedUser !== null && parseInt(data.from) === selectedUser) {
            addBubble(data.msg_id, data.message, data.image, false);
        }
    });

    // ---- RECEIVE DELETE ----
    socket.on("message_deleted", function(data) {
        var wrap = document.querySelector(".bubble-wrap[data-id='" + data.msg_id + "']");
        if (wrap) wrap.remove();
    });


// ---- CLEAR FULL CHAT ----
function clearChat() {
    if (!selectedUser) return;
    if (!confirm("Delete entire chat for both sides?")) return;

    fetch("/delete/chat/" + selectedUser, { method: "DELETE" })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            document.getElementById("chatBox").innerHTML = "";
        }
    });
}

// ---- RECEIVE CHAT CLEARED ----
socket.on("chat_cleared", function() {
    document.getElementById("chatBox").innerHTML = "";
});


function searchUsers(term) {
    term = term.toLowerCase().trim();
    document.querySelectorAll(".user-row").forEach(function(row) {
        if (term.length >= 1) {
            row.style.display = row.innerText.toLowerCase().includes(term) ? "" : "none";
        } else {
            row.style.display = "none";
        }
    });
}
</script>

</body>
</html>
