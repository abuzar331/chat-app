<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chat App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card mx-auto p-4 shadow-sm" style="width: 25rem;">

        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Chat App Logo" width="70" class="mb-1">
            <p class="text-muted mb-0" style="font-size: 14px;">Login to continue</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
<div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <div style="position: relative;">
        <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password" style="padding-right: 45px;">
        <span onclick="togglePassword()" style="
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            user-select: none;
        " id="eyeIcon">👁️</span>
    </div>
</div>
           
            <button type="submit" class="btn btn-primary w-100">Login</button>
         

        </form>

        <p class="text-center mt-3 mb-0 small">
            Don't have account? <a href="{{ url_for('register') }}">Register</a>
        </p>

    </div>
</div>
<script>
function togglePassword() {
    var input = document.getElementById("password");
    var icon = document.getElementById("eyeIcon");
    if (input.type === "password") {
        input.type = "text";
        icon.textContent = "🙈";
    } else {
        input.type = "password";
        icon.textContent = "👁️";
    }
}
</script>
</body>
</html>
